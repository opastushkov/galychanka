<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Галичанка</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f7f4f0;
      --ink:     #0c0c0c;
      --muted:   #8a8480;
      --rule:    #d5d0ca;
      --display: 'Cormorant Garamond', Georgia, serif;
      --sans:    'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    body {
      font-family: var(--display);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 3rem;
      height: 56px;
      border-bottom: 1px solid var(--rule);
    }

    .topbar-brand {
      font-family: var(--sans);
      font-size: .68rem;
      font-weight: 400;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
    }

    .topbar-link {
      font-family: var(--sans);
      font-size: .63rem;
      font-weight: 400;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--bg);
      text-decoration: none;
      background: var(--ink);
      padding: .55rem 1.3rem;
      transition: opacity .2s;
    }

    .topbar-link:hover { opacity: .75; }

    /* ── Hero ── */
    .hero {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 2rem 1.8rem;
      text-align: center;
    }

    .hero-title {
      font-family: var(--display);
      font-weight: 300;
      font-size: clamp(1.1rem, 2.5vw, 1.6rem);
      letter-spacing: .35em;
      text-transform: uppercase;
      line-height: 1;
      color: var(--ink);
    }

    .hero-sub {
      margin-top: .7rem;
      font-family: var(--sans);
      font-size: .58rem;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Full-width rule ── */
    .rule { border: none; border-top: 1px solid var(--rule); }

    /* ── Video ── */
    .video-section {
      padding: 5rem 3rem;
    }

    .video-inner {
      max-width: 920px;
      margin: 0 auto;
    }

    .video-link {
      display: block;
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      overflow: hidden;
      text-decoration: none;
    }

    .video-link img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity .3s;
    }

    .video-link:hover img { opacity: .85; }

    .play-btn {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.1rem;
    }

    .play-circle {
      width: 64px;
      height: 64px;
      border: 1px solid rgba(247,244,240,.7);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color .2s, transform .2s;
    }

    .play-circle svg {
      display: block;
      margin-left: 4px;
    }

    .video-link:hover .play-circle {
      border-color: #f7f4f0;
      transform: scale(1.07);
    }

    .play-label {
      font-family: var(--sans);
      font-size: .62rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: rgba(247,244,240,.7);
      transition: color .2s;
    }

    .video-link:hover .play-label { color: #f7f4f0; }

    /* ── Description ── */
    .desc-section {
      max-width: 920px;
      margin: 0 auto;
      padding: 0 3rem 6rem;
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 2rem;
      align-items: start;
    }

    .desc-label {
      font-family: var(--sans);
      font-size: .62rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--muted);
      padding-top: .3rem;
    }

    .desc-text {
      font-family: var(--display);
      font-weight: 300;
      font-size: 1.15rem;
      line-height: 1.9;
      color: var(--ink);
    }

    /* ── Team CTA ── */
    .team-cta {
      max-width: 920px;
      margin: 0 auto;
      padding: 0 3rem 5rem;
    }

    .team-cta a {
      display: inline-flex;
      align-items: center;
      gap: .9rem;
      font-family: var(--sans);
      font-size: .65rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      border: 1px solid var(--ink);
      padding: .9rem 1.6rem;
      transition: background .2s, color .2s;
    }

    .team-cta a:hover {
      background: var(--ink);
      color: var(--bg);
    }

    /* ── Footer ── */
    footer {
      margin-top: auto;
      border-top: 1px solid var(--rule);
      padding: 1.8rem 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    footer span {
      font-family: var(--sans);
      font-size: .62rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .topbar { padding: 0 1.4rem; }

      .hero { padding: 1.6rem 1.4rem 1.4rem; }

      .team-cta { padding: 0 1.4rem 4rem; }

      .video-section { padding: 3.5rem 0; }

      .desc-section {
        grid-template-columns: 1fr;
        gap: .8rem;
        padding: 0 1.4rem 4rem;
      }

      footer { padding: 1.6rem 1.4rem; }
    }
  </style>
</head>
<body>

<nav class="topbar">
  <span class="topbar-brand">Галичанка</span>
  <a class="topbar-link" href="team.html">Учасники &rarr;</a>
</nav>

<div class="hero">
  <h1 class="hero-title">Галичанка</h1>
  <p class="hero-sub">Мистецький колектив</p>
</div>

<hr class="rule" />

<div class="video-section">
  <div class="video-inner">
    <a class="video-link" href="https://www.youtube.com/watch?v=sQL6fno0Ww0" target="_blank" rel="noopener">
      <img src="https://img.youtube.com/vi/sQL6fno0Ww0/maxresdefault.jpg" alt="Галичанка — відео" />
      <div class="play-btn">
        <div class="play-circle">
          <svg width="14" height="16" viewBox="0 0 14 16" fill="none">
            <path d="M1 1l12 7-12 7V1z" fill="rgba(247,244,240,.85)" />
          </svg>
        </div>
        <span class="play-label">Дивитись на YouTube</span>
      </div>
    </a>
  </div>
</div>

<footer>
  <span>Львів</span>
</footer>

</body>
</html>
